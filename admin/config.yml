backend:
  name: git-gateway
  repo: kaezynkowalski/kaezyn-landing
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "home"
    label: "Landing Principal"
    files:
      - name: "hero"
        label: "Hero"
        file: "content/home.json"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subheadline", widget: "text" }
          - { label: "CTA", name: "cta", widget: "string" }

  - name: "pricing"
    label: "Pricing"
    files:
      - name: "plans"
        label: "Planes"
        file: "admin/pricing.json"
        fields:
          - { label: "Setup Fee", name: "setup_fee", widget: "string" }
          - label: "Planes"
            name: "plans"
            widget: "list"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Eslogan", name: "tagline", widget: "string" }
              - { label: "Precio Mensual", name: "price_monthly", widget: "number" }
              - { label: "Precio Anual Total", name: "price_yearly_total", widget: "number" }
              - { label: "Precio Anual (Mensualizado)", name: "price_yearly_monthly", widget: "number" }
              - { label: "Etiqueta Destacada", name: "badge", widget: "string", required: false }
              - label: "Incluye (Features)"
                name: "features"
                widget: "list"
              - label: "Resultados"
                name: "results"
                widget: "list"
              - { label: "Link Stripe Mensual", name: "stripe_monthly", widget: "string" }
              - { label: "Link Stripe Anual", name: "stripe_yearly", widget: "string" }
              - { label: "Texto del Botón", name: "cta", widget: "string" }
              - { label: "Es el más popular", name: "popular", widget: "boolean" }
