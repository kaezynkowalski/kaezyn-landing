<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear contraseña | Kaezyn</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="icon" type="image/png" href="/assets/favicon.png">

<style>
body{
background:#0b0f2a;
color:white;
font-family:Poppins, sans-serif;
}
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}
.btn-gold{
background:linear-gradient(145deg,#FFD700,#d4af37);
color:#111;
font-weight:600;
padding:10px 20px;
border-radius:8px;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center">

<div class="card p-10 rounded-xl max-w-md w-full text-center">

<img src="/assets/KAEZYN LOGO.png" class="h-10 mx-auto mb-6">

<h2 class="text-2xl font-bold mb-6">
Crear contraseña
</h2>

<input 
id="password"
type="password"
placeholder="Nueva contraseña"
class="w-full mb-4 px-4 py-3 rounded bg-white/10 border border-white/20"
/>

<button onclick="setPassword()" class="btn-gold w-full">
Guardar contraseña
</button>

<p id="status" class="mt-4 text-sm text-gray-300"></p>

</div>

<script>

const SUPABASE_URL = "https://douynvwqijrlqzhbllcv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvdXludndxaWpybHF6aGJsbGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxOTM0MDMsImV4cCI6MjA4NDc2OTQwM30.F_xAB9DUqmcy84I57693q63NY1chlQxPTOK6FtQkAkQ";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function getTokens(){

const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);

return {
access_token: params.get("access_token"),
refresh_token: params.get("refresh_token")
};

}

async function setPassword(){

const password = document.getElementById("password").value;

const tokens = getTokens();

if(tokens.access_token){

await supabaseClient.auth.setSession({
access_token: tokens.access_token,
refresh_token: tokens.refresh_token
});

}

const { error } = await supabaseClient.auth.updateUser({
password: password
});

if(error){

document.getElementById("status").innerText =
"Error guardando contraseña";

return;

}

document.getElementById("status").innerText =
"Contraseña creada. Entrando al portal...";

setTimeout(()=>{

window.location.href="/portal/dashboard.html";

},1000);

}

</script>

</body>
</html>
