<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear contraseña | Kaezyn</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" type="image/png" href="/assets/favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            background: #0b0f2a;
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .btn-gold {
            background: linear-gradient(145deg, #FFD700, #d4af37);
            color: #111;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .input-group {
            position: relative;
        }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            transition: color 0.3s;
        }
        .eye-icon:hover {
            color: white;
        }
        input::placeholder {
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="card p-10 rounded-xl max-w-md w-full text-center shadow-2xl">

    <img src="/assets/KAEZYN LOGO.png" class="h-10 mx-auto mb-6" alt="Kaezyn Logo">

    <h2 class="text-2xl font-bold mb-2">Crear contraseña</h2>
    <p class="text-gray-400 text-sm mb-8">Establece una contraseña segura para proteger tu cuenta.</p>

    <div class="input-group mb-4">
        <input 
            id="password"
            type="password"
            placeholder="Nueva contraseña"
            class="w-full px-4 py-3 rounded bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-500 transition-all"
        />
        <i data-lucide="eye" class="eye-icon" onclick="togglePassword('password', this)"></i>
    </div>

    <div class="input-group mb-6">
        <input 
            id="confirm_password"
            type="password"
            placeholder="Confirmar contraseña"
            class="w-full px-4 py-3 rounded bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-500 transition-all"
        />
        <i data-lucide="eye" class="eye-icon" onclick="togglePassword('confirm_password', this)"></i>
    </div>

    <button onclick="setPassword()" class="btn-gold w-full">
        Guardar contraseña
    </button>

    <p id="status" class="mt-4 text-sm font-medium"></p>

</div>

<script>
    // Inicializar iconos
    lucide.createIcons();

    const SUPABASE_URL = "https://douynvwqijrlqzhbllcv.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvdXludndxaWpybHF6aGJsbGN2Iiwicm9sZSI6ImRvdXludndxaWpybHF6aGJsbGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxOTM0MDMsImV4cCI6MjA4NDc2OTQwM30.F_xAB9DUqmcy84I57693q63NY1chlQxPTOK6FtQkAkQ";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Función para mostrar/ocultar contraseña
    function togglePassword(inputId, iconElement) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        
        // Cambiar icono visualmente
        const iconName = isPassword ? "eye-off" : "eye";
        iconElement.setAttribute("data-lucide", iconName);
        lucide.createIcons();
    }

    function getTokens(){
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        return {
            access_token: params.get("access_token"),
            refresh_token: params.get("refresh_token")
        };
    }

    async function setPassword(){
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;
        const statusEl = document.getElementById("status");

        // 1. Validaciones básicas
        if (!password || !confirmPassword) {
            statusEl.innerText = "Por favor completa ambos campos.";
            statusEl.className = "mt-4 text-sm text-yellow-400";
            return;
        }

        if (password !== confirmPassword) {
            statusEl.innerText = "Las contraseñas no coinciden.";
            statusEl.className = "mt-4 text-sm text-red-400";
            return;
        }

        if (password.length < 6) {
            statusEl.innerText = "La contraseña debe tener al menos 6 caracteres.";
            statusEl.className = "mt-4 text-sm text-yellow-400";
            return;
        }

        statusEl.innerText = "Procesando...";
        statusEl.className = "mt-4 text-sm text-gray-300";

        const tokens = getTokens();

        if(tokens.access_token){
            await supabaseClient.auth.setSession({
                access_token: tokens.access_token,
                refresh_token: tokens.refresh_token
            });
        }

        const { error } = await supabaseClient.auth.updateUser({
            password: password
        });

        if(error){
            statusEl.innerText = "Error: " + error.message;
            statusEl.className = "mt-4 text-sm text-red-400";
            return;
        }

        statusEl.innerText = "¡Contraseña creada! Redirigiendo...";
        statusEl.className = "mt-4 text-sm text-green-400";

        setTimeout(()=>{
            window.location.href="/portal/dashboard.html";
        }, 1500);
    }
</script>

</body>
</html>
