<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear contraseña | Kaezyn</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="icon" type="image/png" href="/assets/favicon.png">

<style>
body{
background:#0b0f2a;
color:white;
font-family:Poppins, sans-serif;
}
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}
.btn-gold{
background:linear-gradient(145deg,#FFD700,#d4af37);
color:#111;
font-weight:600;
padding:10px 20px;
border-radius:8px;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center">

<div class="card p-10 rounded-xl max-w-md w-full text-center">

<img src="/assets/KAEZYN LOGO.png" class="h-10 mx-auto mb-6">

<h2 class="text-2xl font-bold mb-6">
Crear contraseña
</h2>

<input 
id="password"
type="password"
placeholder="Nueva contraseña"
class="w-full mb-4 px-4 py-3 rounded bg-white/10 border border-white/20"
/>

<button onclick="setPassword()" class="btn-gold w-full">
Guardar contraseña
</button>

<p id="status" class="mt-4 text-sm text-gray-300"></p>

</div>

<script>

const SUPABASE_URL = "https://TU_PROJECT_ID.supabase.co";
const SUPABASE_KEY = "TU_PUBLIC_ANON_KEY";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function setPassword(){

const password = document.getElementById("password").value;

const { error } = await supabase.auth.updateUser({
password: password
});

if(error){
document.getElementById("status").innerText = "Error al guardar contraseña";
return;
}

document.getElementById("status").innerText = "Contraseña creada";

setTimeout(()=>{
window.location.href="/portal/login.html";
},1500);

}

</script>

</body>
</html>
