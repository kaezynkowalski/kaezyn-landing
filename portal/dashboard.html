<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Kaezyn</title>

<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --color-night-blue: #0b0f2a;
    --color-violet: #4d2a7a;
    --color-gold: #FFD700;
    --color-gold-dark: #d4af37;
    --color-light-gray: #EAEAEA;
}
body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--color-night-blue);
    color: var(--color-light-gray);
}
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}
.btn-gold {
    background: linear-gradient(145deg, var(--color-gold), var(--color-gold-dark));
    color: #1a1a1a;
    font-weight: 600;
    border-radius: 8px;
    padding: 10px 20px;
    transition: all 0.3s ease;
    white-space: nowrap;
}
.btn-gold:hover {
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
}
.btn-gold:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}
</style>
</head>

<body class="min-h-screen">

<div class="container mx-auto px-6 py-10">

    <div class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-4">
        <img src="/assets/KAEZYN LOGO.png" class="h-10">
        <div class="text-center sm:text-right">
            <p id="planName" class="font-bold text-yellow-300"></p>
            <p id="renewalDate" class="text-sm text-gray-400"></p>
            <button onclick="Portal.logout()" class="text-sm text-gray-400 mt-2 hover:text-white transition">Cerrar sesión</button>
        </div>
    </div>

    <div id="dashboard"></div>

    <div class="card rounded-xl p-5 sm:p-8 mb-8 w-full max-w-full overflow-hidden">
        <h2 class="text-2xl font-bold mb-6">Sucursales</h2>

        <div class="overflow-x-auto w-full">
            <table class="w-full text-left min-w-[600px]">
                <thead>
                    <tr class="text-gray-400 border-b border-white/10">
                        <th class="pb-3 px-2">Nombre</th>
                        <th class="pb-3 px-2">Client ID</th>
                        <th class="pb-3 px-2">Estado</th>
                        <th class="pb-3 px-2 text-right">Acción</th>
                    </tr>
                </thead>
                <tbody id="branchesTable"></tbody>
            </table>
        </div>

        <div class="mt-8 flex justify-center sm:justify-start">
            <button id="btnStripe" class="btn-gold w-full sm:w-auto" onclick="Portal.openStripePortal(window.currentCustomerId)">
                Administrar Suscripción
            </button>
        </div>
    </div>

</div>

<script src="portal.js"></script>
<script>
Portal.loadDashboard();
</script>

</body>
</html>
