<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Kaezyn</title>

<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --color-night-blue: #0b0f2a;
    --color-violet: #4d2a7a;
    --color-gold: #FFD700;
    --color-gold-dark: #d4af37;
    --color-light-gray: #EAEAEA;
}
body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--color-night-blue);
    color: var(--color-light-gray);
}
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}
.btn-gold {
    background: linear-gradient(145deg, var(--color-gold), var(--color-gold-dark));
    color: #1a1a1a;
    font-weight: 600;
    border-radius: 8px;
    padding: 10px 20px;
    transition: all 0.3s ease;
    white-space: nowrap;
}
.btn-gold:hover {
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
}

/* Estilo para el Toggle Switch (Auto Top-up) */
.toggle-checkbox:checked {
  right: 0;
  border-color: #FFD700;
}
.toggle-checkbox:checked + .toggle-label {
  background-color: #FFD700;
}
</style>
</head>

<body class="min-h-screen pb-12">

<div class="container mx-auto px-6 py-10 max-w-6xl">

    <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
        <img src="/assets/KAEZYN LOGO.png" class="h-10">
        <div class="text-center sm:text-right">
            <p id="planName" class="font-bold text-yellow-300 tracking-wider uppercase text-sm"></p>
            <p id="renewalDate" class="text-xs text-gray-400 mt-1"></p>
            <button onclick="Portal.logout()" class="text-xs text-gray-500 mt-2 hover:text-white transition uppercase tracking-widest"><i class="fas fa-sign-out-alt mr-1"></i> Cerrar sesión</button>
        </div>
    </div>

    <div id="usageWidgetContainer" class="mb-8"></div>

    <div id="dashboard"></div>

    <div class="mt-10 flex justify-center sm:justify-start">
        <button id="btnStripe" class="bg-white/10 hover:bg-white/20 text-white px-6 py-3 rounded-xl font-bold transition-all border border-white/10 shadow-lg text-sm uppercase tracking-wider w-full sm:w-auto" onclick="Portal.openStripePortal(window.currentCustomerId)">
            <i class="fas fa-credit-card mr-2"></i> Administrar Facturación
        </button>
    </div>
</div>

<script src="portal.js"></script>
<script>
Portal.loadDashboard();
</script>

</body>
</html>
