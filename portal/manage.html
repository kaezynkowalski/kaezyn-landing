<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Sucursal | Kaezyn</title>
    
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-night-blue: #0b0f2a;
            --color-gold: #FFD700;
            --color-gold-dark: #d4af37;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--color-night-blue);
            color: #EAEAEA;
            background-image: radial-gradient(circle at top right, rgba(77, 42, 122, 0.2), transparent);
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: var(--color-gold);
            outline: none;
            background: rgba(255,255,255,0.1);
        }
        .btn-gold {
            background: linear-gradient(145deg, var(--color-gold), var(--color-gold-dark));
            color: #1a1a1a;
            transition: transform 0.2s;
        }
        .btn-gold:active { transform: scale(0.98); }
        .loading-overlay {
            background: var(--color-night-blue);
            z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loader" class="loading-overlay fixed inset-0 flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-yellow-400"></div>
    </div>

    <div class="container mx-auto px-6 py-10 max-w-2xl">
        
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.location.href='dashboard.html'" class="text-sm text-gray-400 hover:text-white flex items-center">
                ← Volver al Dashboard
            </button>
            <img src="/assets/KAEZYN LOGO.png" class="h-8">
        </div>

        <div class="card rounded-2xl p-8">
            <h1 id="headerTitle" class="text-2xl font-bold mb-2 text-white">Configuración</h1>
            <p class="text-gray-400 text-sm mb-8">Edita los detalles de tu sucursal y guarda los cambios.</p>

            <form id="manageForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-yellow-400 mb-2">Nombre del Negocio</label>
                    <input type="text" id="business_name" class="input-field w-full px-4 py-3 rounded-lg" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-yellow-400 mb-2">Client ID (Identificador)</label>
                    <input type="text" id="client_id" class="input-field w-full px-4 py-3 rounded-lg font-mono text-sm">
                </div>

                <div class="relative">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold uppercase tracking-wider text-yellow-400">Google Place ID</label>
                        <button type="button" onclick="window.open('https://developers.google.com/maps/documentation/javascript/examples/places-placeid-finder', '_blank')" 
                                class="text-[10px] text-gray-400 hover:text-yellow-400 transition italic underline">
                            ¿No sabes tu Place ID? Búscalo aquí
                        </button>
                    </div>

                    <div class="flex gap-2">
                        <div class="relative flex grow">
                            <span class="inline-flex items-center px-3 rounded-l-lg border border-r-0 border-white/20 bg-white/10 text-gray-400 text-[10px] shrink-0">
                                .../placeid=
                            </span>
                            <input type="text" id="google_place_id" 
                                   class="input-field w-full px-4 py-3 rounded-r-lg text-sm pr-10" 
                                   placeholder="ChIJAYP4EoH_0YUR..."
                                   oninput="validatePlaceId(this.value)">
            
                            <div id="check_google" class="absolute right-3 top-1/2 -translate-y-1/2 hidden">
                                <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </div>
        
                        <button type="button" onclick="testGoogleLink()" 
                                class="px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-xs font-bold hover:bg-white/20 transition">
                            Probar Enlace
                        </button>
                    </div>
                    <p class="text-[10px] text-gray-500 mt-1">Ingresa el código Place ID y presiona "Probar" para verificar.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-yellow-400 mb-2">Email del Manager</label>
                        <input type="email" id="manager_email" class="input-field w-full px-4 py-3 rounded-lg text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-yellow-400 mb-2">Teléfono (+52...)</label>
                        <input type="tel" id="manager_phone" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="+52 5512345678">
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 bg-white/5 rounded-lg border border-white/10">
                    <span class="text-sm text-gray-300">Estado de Operación</span>
                    <span id="statusBadge" class="px-3 py-1 rounded-full text-xs font-bold uppercase"></span>
                </div>

                <div class="pt-4">
                    <button type="submit" id="saveBtn" class="btn-gold w-full py-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg">
                        Guardar Cambios
                    </button>
                </div>
            </form>
            
            <p id="msg" class="mt-6 text-center text-sm font-medium hidden"></p>
        </div>
    </div>

    <script src="portal.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Obtener ID de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const branchId = urlParams.get('id');

            if (!branchId) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Función para probar el enlace de Google en una pestaña nueva
            // Coloca esto al principio de tu <script> o bien arriba, 
        
        
            function validatePlaceId(value) {
                const check = document.getElementById('check_google');
                // Si tiene más de 5 caracteres, mostramos el check (un Place ID real suele ser largo)
                if (value.trim().length > 5) {
                    check.classList.remove('hidden');
                } else {
                    check.classList.add('hidden');
                }
            }
            
        
            function testGoogleLink() {
                const input = document.getElementById('google_place_id');
                const placeId = input ? input.value.trim() : "";
    
                if (!placeId) {
                    alert("Por favor, ingresa un Place ID primero.");
                    return;
                }
    
                const fullUrl = `https://search.google.com/local/writereview?placeid=${placeId}`;
                window.open(fullUrl, '_blank');
            }
    
            const fullUrl = `https://search.google.com/local/writereview?placeid=${placeId}`;
    
            console.log("Probando enlace:", fullUrl); // Esto te ayudará a ver si dispara en la consola
            window.open(fullUrl, '_blank');
        }

            // 2. Cargar datos
            const branch = await Portal.getBranchDetails(branchId);
            const fullUrl = branch.google_review_url || "";
            const placeId = fullUrl.includes('placeid=') ? fullUrl.split('placeid=')[1] : "";

            
            if (branch) {
                document.getElementById('business_name').value = branch.business_name || "";
                document.getElementById('client_id').value = branch.client_id || "";
                document.getElementById('google_place_id').value = placeId;
                document.getElementById('manager_email').value = branch.manager_email || "";
                document.getElementById('manager_phone').value = branch.manager_phone || "";
                document.getElementById('headerTitle').innerText = "Sucursal " + (branch.branch_number || "");
                
                const badge = document.getElementById('statusBadge');
                badge.innerText = branch.activo ? 'Activa' : 'Pausada';
                badge.className += branch.activo ? ' bg-green-500/20 text-green-400' : ' bg-yellow-500/20 text-yellow-400';
                
                document.getElementById('loader').classList.add('hidden');
            } else {
                alert("No tienes permiso para ver esta sucursal.");
                window.location.href = 'dashboard.html';
            }

            // 3. Manejar el guardado
            // Dentro del onsubmit del formulario, asegúrate de procesar el teléfono y el ID
            document.getElementById('manageForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveBtn');
                const msg = document.getElementById('msg');
    
                const phone = document.getElementById('manager_phone').value.trim();
                const placeId = document.getElementById('google_place_id').value.trim();

                // VALIDACIÓN TELÉFONO: Debe tener '+' y al menos 10 dígitos
                // Eliminamos espacios para la validación (ej: +52 55... -> +5255...)
                const cleanPhone = phone.replace(/\s/g, "");
                const phoneRegex = /^\+\d{10,15}$/; 
    
                if (!phoneRegex.test(cleanPhone)) {
                    alert("Formato de teléfono inválido. Debe ser: +52 5512345678");
                    return;
                }

                btn.disabled = true;
                btn.innerText = "GUARDANDO...";

                const updates = {
                    business_name: document.getElementById('business_name').value,
                    client_id: document.getElementById('client_id').value,
                    google_review_url: placeId ? `https://search.google.com/local/writereview?placeid=${placeId}` : null,
                    manager_email: document.getElementById('manager_email').value,
                    manager_phone: phone // Guardamos el formato con espacios si el usuario lo prefiere, pero validado
                };

                const success = await Portal.updateBranch(branchId, updates);

                if (success) {
                    msg.innerText = "¡Cambios guardados correctamente!";
                    msg.className = "mt-6 text-center text-sm font-medium text-green-400";
                } else {
                    msg.innerText = "Hubo un error al guardar. Revisa tu conexión.";
                    msg.className = "mt-6 text-center text-sm font-medium text-red-400";
                }
    
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "GUARDAR CAMBIOS";
                setTimeout(() => msg.classList.add('hidden'), 4000);
            };
        });
    </script>
</body>
</html>
