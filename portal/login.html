<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Kaezyn</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0b0f2a;
  color: white;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="bg-white/5 p-10 rounded-xl w-full max-w-md">
  <h1 class="text-2xl font-bold mb-6 text-center">Acceso Kaezyn</h1>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-4 p-3 rounded bg-white/10">

  <input id="password" type="password" placeholder="Contraseña"
    class="w-full mb-6 p-3 rounded bg-white/10">

  <button onclick="Portal.login()" 
    class="w-full bg-yellow-400 text-black font-bold py-3 rounded">
    Iniciar sesión
  </button>

  <p id="errorMsg" class="text-red-400 mt-4 text-sm"></p>
</div>

<script src="portal.js"></script>

</body>
</html>
