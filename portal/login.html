<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kaezyn</title>

    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-night-blue: #0b0f2a;
            --color-violet: #4d2a7a;
            --color-gold: #FFD700;
            --color-gold-dark: #d4af37;
            --color-light-gray: #EAEAEA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, var(--color-violet), var(--color-night-blue));
            color: var(--color-light-gray);
            position: relative;
            overflow: hidden;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .stars-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            color: var(--color-gold);
            opacity: 0;
            animation: sparkle 15s infinite linear;
            text-shadow: 0 0 10px var(--color-gold);
        }

        /* Tus estrellas animadas */
        .star:nth-child(1) { top: 10%; left: 80%; font-size: 2rem; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; left: 60%; font-size: 1.5rem; animation-delay: 2s; }
        .star:nth-child(3) { top: 5%; left: 40%; font-size: 1rem; animation-delay: 4s; }
        .star:nth-child(4) { top: 50%; left: 90%; font-size: 1.8rem; animation-delay: 6s; }
        .star:nth-child(5) { top: 70%; left: 75%; font-size: 1.2rem; animation-delay: 8s; }
        .star:nth-child(6) { top: 90%; left: 50%; font-size: 2.2rem; animation-delay: 10s; }
        .star:nth-child(7) { top: 40%; left: 30%; font-size: 1.3rem; animation-delay: 12s; }

        @keyframes sparkle {
            0% { transform: translateY(20px) scale(0.5); opacity: 0; }
            25% { opacity: 1; }
            75% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .input-group {
            position: relative;
        }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center antialiased">

<div class="stars-container">
    <div class="star">★</div>
    <div class="star">☆</div>
    <div class="star">★</div>
    <div class="star">☆</div>
    <div class="star">★</div>
    <div class="star">☆</div>
    <div class="star">★</div>
</div>

<div class="card p-10 rounded-xl w-full max-w-md text-center z-10 shadow-2xl">
    <img src="/assets/KAEZYN LOGO.png" class="h-10 mx-auto mb-6">
    <h1 class="text-2xl font-bold mb-6">Inicia Sesión</h1>

    <form id="loginForm" class="space-y-4">
        <input type="email"
               id="email"
               placeholder="Correo electrónico"
               required
               class="w-full px-4 py-3 rounded-md bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-400 transition-all text-white">

        <div class="input-group">
            <input type="password"
                   id="password"
                   placeholder="Contraseña"
                   required
                   class="w-full px-4 py-3 rounded-md bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-400 transition-all text-white">
            <i data-lucide="eye" class="eye-icon" id="toggleEye" onclick="togglePass()"></i>
        </div>

        <button type="submit"
                id="submitBtn"
                class="w-full bg-yellow-400 text-black font-semibold py-3 rounded-md hover:bg-yellow-300 transition duration-300 shadow-lg">
            Entrar
        </button>
    </form>

    <p id="errorMessage" class="text-red-400 text-sm mt-4 font-medium"></p>
</div>

<script>
// 1. Configuración Real con tus datos
const SUPABASE_URL = "https://douynvwqijrlqzhbllcv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvdXludndxaWpybHF6aGJsbGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxOTM0MDMsImV4cCI6MjA4NDc2OTQwM30.F_xAB9DUqmcy84I57693q63NY1chlQxPTOK6FtQkAkQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Inicializar iconos
lucide.createIcons();

// Función del ojo
function togglePass() {
    const passInput = document.getElementById("password");
    const eyeIcon = document.getElementById("toggleEye");
    const isPass = passInput.type === "password";
    
    passInput.type = isPass ? "text" : "password";
    eyeIcon.setAttribute("data-lucide", isPass ? "eye-off" : "eye");
    lucide.createIcons();
}

// Redirección automática si ya hay sesión
(async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        window.location.href = "/portal/dashboard.html";
    }
})();

// Manejo del Login
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMessage");
    const btn = document.getElementById("submitBtn");

    errorMsg.innerText = "";
    btn.innerText = "Verificando...";
    btn.disabled = true;

    try {
        const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
        });

        if (error) throw error;

        // Login exitoso
        btn.innerText = "¡Bienvenido!";
        window.location.href = "/portal/dashboard.html";

    } catch (err) {
        errorMsg.innerText = "Acceso denegado: " + err.message;
        btn.innerText = "Entrar";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
