<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kaezyn</title>

    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="/portal/portal.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-night-blue: #0b0f2a;
            --color-violet: #4d2a7a;
            --color-gold: #FFD700;
            --color-gold-dark: #d4af37;
            --color-light-gray: #EAEAEA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Fondo más profundo y envolvente */
            background: radial-gradient(circle at center, var(--color-violet) 0%, var(--color-night-blue) 100%);
            color: var(--color-light-gray);
            position: relative;
            overflow: hidden;
        }

        /* Glassmorphism Pro: Más desenfoque y borde sutil */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Estrellas en toda la pantalla */
        .stars-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            color: var(--color-gold);
            opacity: 0;
            animation: sparkle 10s infinite linear;
            text-shadow: 0 0 10px var(--color-gold);
        }

        /* Animación de estrellas mejorada */
        @keyframes sparkle {
            0% { transform: translateY(50px) scale(0.5); opacity: 0; }
            25% { opacity: 0.8; }
            75% { opacity: 0.8; }
            100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
        }

        .input-group { position: relative; }
    
        /* Inputs más modernos */
        .custom-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
    
        .custom-input:focus {
            border-color: var(--color-gold) !important;
            background: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            transition: color 0.3s;
        }
        .eye-icon:hover { color: var(--color-gold); }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center antialiased">

<div class="stars-container">
    <div class="star" style="top: 20%; left: 10%; animation-delay: 0s;">★</div>
    <div class="star" style="top: 60%; left: 80%; animation-delay: 2s;">☆</div>
    <div class="star" style="top: 85%; left: 15%; animation-delay: 4s;">★</div>
    <div class="star" style="top: 10%; left: 70%; animation-delay: 6s;">☆</div>
    <div class="star" style="top: 40%; left: 90%; animation-delay: 1s;">★</div>
    <div class="star" style="top: 70%; left: 40%; animation-delay: 8s;">☆</div>
</div>

<div class="card p-10 rounded-xl w-full max-w-md text-center z-10">
    <img src="/assets/KAEZYN LOGO.png" class="h-10 mx-auto mb-6">
    <h1 class="text-2xl font-bold mb-6">Inicia Sesión</h1>

    <form id="loginForm" class="space-y-6">
        <div class="text-left">
            <label class="text-xs font-semibold text-gray-400 ml-1 uppercase tracking-wider">Email Corporativo</label>
            <input type="email" id="email" placeholder="nombre@negocio.com" required
                   class="custom-input w-full px-4 py-4 rounded-xl mt-2 text-white focus:outline-none">
        </div>

        <div class="text-left">
            <label class="text-xs font-semibold text-gray-400 ml-1 uppercase tracking-wider">Contraseña</label>
            <div class="input-group mt-2">
                <input type="password" id="password" placeholder="••••••••" required
                       class="custom-input w-full px-4 py-4 rounded-xl text-white focus:outline-none">
                <i data-lucide="eye" class="eye-icon" onclick="togglePass(this)"></i>
            </div>
        </div>

        <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-[#FFD700] to-[#d4af37] text-black font-extrabold py-4 rounded-xl hover:scale-[1.02] transition-all shadow-[0_10px_20px_rgba(255,215,0,0.2)] uppercase tracking-widest text-sm">
            Entrar 
        </button>
    </form>

    <p id="errorMessage" class="text-red-400 text-sm mt-4 font-medium"></p>

    <div class="mt-8">
        <a href="javascript:void(0)" onclick="showForgotPassword()" class="text-xs text-gray-400 hover:text-yellow-400 transition-all tracking-wide">
            ¿Olvidaste tu contraseña? <span class="underline ml-1">Recuperar</span>
        </a>
    </div>
</div>

<div id="recoveryModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="card p-10 rounded-3xl max-w-sm w-full text-center border border-white/10">
        <div class="w-16 h-16 bg-yellow-400/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="shield-question" class="text-yellow-400 w-8 h-8"></i>
        </div>
        <h3 class="text-xl font-bold mb-2 text-white">Recuperar Acceso</h3>
        <p class="text-sm text-gray-400 mb-8">Enviaremos un enlace de seguridad a tu correo registrado.</p>
        
        <input type="email" id="recoveryEmail" placeholder="tu@email.com" 
               class="custom-input w-full px-4 py-4 rounded-xl text-white mb-6 focus:outline-none text-center">
        
        <div class="flex flex-col gap-3">
            <button onclick="handleRecoverySubmit()" id="recoveryBtn" class="w-full bg-yellow-400 text-black font-bold py-3 rounded-xl">Enviar Enlace</button>
            <button onclick="hideForgotPassword()" class="w-full text-gray-500 hover:text-white transition text-xs font-semibold uppercase tracking-widest">Cancelar</button>
        </div>
        <p id="recoveryStatus" class="mt-4 text-xs font-medium"></p>
    </div>
</div>

<script>
    // Inicializar iconos
    lucide.createIcons();

    // Función visual para el ojo
    function togglePass(icon) {
        const input = document.getElementById("password");
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        icon.setAttribute("data-lucide", isPass ? "eye-off" : "eye");
        lucide.createIcons();
    }

    // El formulario ahora usa el objeto Portal de portal.js
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMessage");
        const btn = document.getElementById("submitBtn");

        errorMsg.innerText = "";
        btn.innerText = "Verificando...";
        btn.disabled = true;

        try {
            // USAMOS LA FUNCIÓN CENTRALIZADA EN PORTAL.JS
            await Portal.login(email, password);
            
            // Si el login es exitoso, redirigimos
            window.location.href = "/portal/dashboard.html";
        } catch (err) {
            errorMsg.innerText = "Acceso incorrecto. Verifica tus datos.";
            btn.innerText = "Entrar";
            btn.disabled = false;
        }
    });
    
    // Funciones visuales para el modal
    function showForgotPassword() {
        document.getElementById('recoveryModal').classList.remove('hidden');
    }

    function hideForgotPassword() {
        document.getElementById('recoveryModal').classList.add('hidden');
        document.getElementById('recoveryStatus').innerText = "";
    }

    async function handleRecoverySubmit() {
        const email = document.getElementById('recoveryEmail').value;
        const status = document.getElementById('recoveryStatus');
        const btn = document.getElementById('recoveryBtn');

        if (!email) {
            status.innerText = "Por favor ingresa tu correo.";
            status.className = "mt-4 text-xs text-yellow-400";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            // Llamamos a la nueva función que pondremos en portal.js
            await Portal.sendResetPassword(email);
        
            status.innerText = "¡Enviado! Revisa tu bandeja de entrada.";
            status.className = "mt-4 text-xs text-green-400";
        
            setTimeout(hideForgotPassword, 3000);
        } catch (err) {
            status.innerText = "Error: " + err.message;
            status.className = "mt-4 text-xs text-red-400";
        } finally {
            btn.disabled = false;
            btn.innerText = "Enviar";
        }
    }
</script>

</body>
</html>
