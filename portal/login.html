<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kaezyn</title>

    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="/portal/portal.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-night-blue: #0b0f2a;
            --color-violet: #4d2a7a;
            --color-gold: #FFD700;
            --color-gold-dark: #d4af37;
            --color-light-gray: #EAEAEA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, var(--color-violet), var(--color-night-blue));
            color: var(--color-light-gray);
            position: relative;
            overflow: hidden;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .stars-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            color: var(--color-gold);
            opacity: 0;
            animation: sparkle 15s infinite linear;
            text-shadow: 0 0 10px var(--color-gold);
        }

        /* Estrellas animadas */
        .star:nth-child(1) { top: 10%; left: 80%; font-size: 2rem; }
        .star:nth-child(2) { top: 25%; left: 60%; font-size: 1.5rem; }
        .star:nth-child(3) { top: 5%; left: 40%; font-size: 1rem; }
        .star:nth-child(4) { top: 50%; left: 90%; font-size: 1.8rem; }
        .star:nth-child(5) { top: 70%; left: 75%; font-size: 1.2rem; }
        .star:nth-child(6) { top: 90%; left: 50%; font-size: 2.2rem; }
        .star:nth-child(7) { top: 40%; left: 30%; font-size: 1.3rem; }

        @keyframes sparkle {
            0% { transform: translateY(20px) scale(0.5); opacity: 0; }
            25% { opacity: 1; }
            75% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .input-group { position: relative; }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center antialiased">

<div class="stars-container">
     <i class="fas fa-star star"></i>
     <i class="fas fa-star star"></i>
     <i class="fas fa-star star"></i>
     <i class="fas fa-star star"></i>
     <i class="fas fa-star star"></i>
     <i class="fas fa-star star"></i>
     <i class="fas fa-star star"></i>
</div>

<div class="card p-10 rounded-xl w-full max-w-md text-center z-10">
    <img src="/assets/KAEZYN LOGO.png" class="h-10 mx-auto mb-6">
    <h1 class="text-2xl font-bold mb-6">Inicia Sesión</h1>

    <form id="loginForm" class="space-y-4">
        <input type="email" id="email" placeholder="Correo electrónico" required
               class="w-full px-4 py-3 rounded-md bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-400 text-white">

        <div class="input-group">
            <input type="password" id="password" placeholder="Contraseña" required
                   class="w-full px-4 py-3 rounded-md bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-400 text-white">
            <i data-lucide="eye" class="eye-icon" onclick="togglePass(this)"></i>
        </div>

        <button type="submit" id="submitBtn"
                class="w-full bg-yellow-400 text-black font-semibold py-3 rounded-md hover:bg-yellow-300 transition shadow-lg">
            Entrar
        </button>
    </form>

    <p id="errorMessage" class="text-red-400 text-sm mt-4"></p>

    <div class="mt-6">
    <a href="javascript:void(0)" onclick="showForgotPassword()" class="text-sm text-yellow-400/80 hover:text-yellow-400 transition underline decoration-1 underline-offset-4">
        ¿Olvidaste tu contraseña?
    </a>
</div>

<div id="recoveryModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="card p-8 rounded-xl max-w-sm w-full text-center border border-white/20">
        <h3 class="text-xl font-bold mb-4">Recuperar Acceso</h3>
        <p class="text-sm text-gray-400 mb-6">Ingresa tu correo y te enviaremos un enlace de restablecimiento.</p>
        
        <input type="email" id="recoveryEmail" placeholder="tu@email.com" 
               class="w-full px-4 py-3 rounded-md bg-white/10 border border-white/20 focus:outline-none focus:border-yellow-400 text-white mb-4">
        
        <div class="flex gap-3">
            <button onclick="hideForgotPassword()" class="flex-1 px-4 py-2 rounded-md bg-white/5 hover:bg-white/10 transition text-sm">Cancelar</button>
            <button onclick="handleRecoverySubmit()" id="recoveryBtn" class="flex-1 btn-gold px-4 py-2 rounded-md bg-yellow-400 text-black font-bold text-sm">Enviar</button>
        </div>
        <p id="recoveryStatus" class="mt-4 text-xs font-medium"></p>
    </div>
</div>

<script>
    // Inicializar iconos
    lucide.createIcons();

    // Función visual para el ojo
    function togglePass(icon) {
        const input = document.getElementById("password");
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        icon.setAttribute("data-lucide", isPass ? "eye-off" : "eye");
        lucide.createIcons();
    }

    // El formulario ahora usa el objeto Portal de portal.js
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMessage");
        const btn = document.getElementById("submitBtn");

        errorMsg.innerText = "";
        btn.innerText = "Verificando...";
        btn.disabled = true;

        try {
            // USAMOS LA FUNCIÓN CENTRALIZADA EN PORTAL.JS
            await Portal.login(email, password);
            
            // Si el login es exitoso, redirigimos
            window.location.href = "/portal/dashboard.html";
        } catch (err) {
            errorMsg.innerText = "Acceso incorrecto. Verifica tus datos.";
            btn.innerText = "Entrar";
            btn.disabled = false;
        }
    });
    
    // Funciones visuales para el modal
    function showForgotPassword() {
        document.getElementById('recoveryModal').classList.remove('hidden');
    }

    function hideForgotPassword() {
        document.getElementById('recoveryModal').classList.add('hidden');
        document.getElementById('recoveryStatus').innerText = "";
    }

    async function handleRecoverySubmit() {
        const email = document.getElementById('recoveryEmail').value;
        const status = document.getElementById('recoveryStatus');
        const btn = document.getElementById('recoveryBtn');

        if (!email) {
            status.innerText = "Por favor ingresa tu correo.";
            status.className = "mt-4 text-xs text-yellow-400";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            // Llamamos a la nueva función que pondremos en portal.js
            await Portal.sendResetPassword(email);
        
            status.innerText = "¡Enviado! Revisa tu bandeja de entrada.";
            status.className = "mt-4 text-xs text-green-400";
        
            setTimeout(hideForgotPassword, 3000);
        } catch (err) {
            status.innerText = "Error: " + err.message;
            status.className = "mt-4 text-xs text-red-400";
        } finally {
            btn.disabled = false;
            btn.innerText = "Enviar";
        }
    }
</script>

</body>
</html>
